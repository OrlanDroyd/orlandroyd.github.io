<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Orlando Peña Fernández — orlandroyd.com</title>

  <!-- Instant redirect (0s) — strongest signal Google accepts short of a 301 -->
  <meta http-equiv="refresh" content="0;url=https://orlandroyd.com/" />

  <!-- Canonical: consolidates ranking signals to the new domain -->
  <link rel="canonical" href="https://orlandroyd.com/" />

  <!-- Tell crawlers this URL is gone / moved so they drop it from the index -->
  <meta name="robots" content="noindex, follow" />

  <meta name="description" content="This site has permanently moved to orlandroyd.com." />

  <script>
    // Client-side hard redirect as a second layer; runs before the meta refresh in most browsers.
    window.location.replace("https://orlandroyd.com/");
  </script>

  <style>
    body { background:#0d0d0d; color:#e0e0e0; font-family:system-ui,sans-serif;
           min-height:100vh; display:flex; align-items:center; justify-content:center;
           text-align:center; padding:2rem; margin:0; }
    a { color:#aaff6e; font-weight:600; text-decoration:none; }
  </style>
</head>
<body>
  <div>
    <h1>This site has moved</h1>
    <p>Redirecting to <a href="https://orlandroyd.com/">orlandroyd.com</a>…</p>
  </div>
</body>
</html>
